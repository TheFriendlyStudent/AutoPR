name: Run AutoRender Test

# Trigger manually
on:
  workflow_dispatch:
    inputs:
      fb_token:
        description: 'Enter your Facebook / Instagram Access Token (expires frequently)'
        required: true
        type: string

jobs:
  run_test:
    runs-on: ubuntu-latest

    env:
      # Static secrets (stored in your repo)
      ACCOUNT_ID: ${{ secrets.ACCOUNT_ID }}
      ACCESS_KEY: ${{ secrets.ACCESS_KEY }}
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      BUCKET_NAME: ${{ secrets.BUCKET_NAME }}
      PUBLIC_URL_BASE: ${{ secrets.PUBLIC_URL_BASE }}
      MY_APP_ID: ${{ secrets.MY_APP_ID }}
      MY_APP_SECRET: ${{ secrets.MY_APP_SECRET }}

      # Dynamic token input from workflow_dispatch
      MY_ACCESS_TOKEN: ${{ github.event.inputs.fb_token }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.11

    - name: Upgrade pip
      run: python -m pip install --upgrade pip

    - name: Install dependencies
      run: |
        echo "Installing dependencies from requirements.txt..."
        pip install --no-cache-dir -r requirements.txt
        # Install any additional runtime dependencies just in case
        pip install --no-cache-dir pytz boto3 pillow requests

    - name: Verify dynamic token
      run: |
        echo "MY_ACCESS_TOKEN received: $MY_ACCESS_TOKEN"
        python -c "import os; print('Token length:', len(os.getenv('MY_ACCESS_TOKEN', '')))"

    - name: Run test.py
      run: |
        echo "Running test.py..."
        python test.py
