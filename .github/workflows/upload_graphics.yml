name: Run AutoRender Test

# Trigger manually
on:
  workflow_dispatch:
    inputs:
      fb_token:
        description: 'Enter your Facebook / Instagram Access Token (expires frequently)'
        required: true
        type: string

jobs:
  run_test:
    runs-on: ubuntu-latest

    env:
      # Static secrets (stored in your repo)
      ACCOUNT_ID: ${{ secrets.ACCOUNT_ID }}
      ACCESS_KEY: ${{ secrets.ACCESS_KEY }}
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      BUCKET_NAME: ${{ secrets.BUCKET_NAME }}
      PUBLIC_URL_BASE: ${{ secrets.PUBLIC_URL_BASE }}
      MY_APP_ID: ${{ secrets.MY_APP_ID }}
      MY_APP_SECRET: ${{ secrets.MY_APP_SECRET }}

      # Dynamic token input
      MY_ACCESS_TOKEN: ${{ github.event.inputs.fb_token }}

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.11

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # Make sure pytz is included
        pip install pytz boto3 pillow requests

    - name: Run test.py
      run: |
        echo "Running test.py with MY_ACCESS_TOKEN from user input..."
        python test.py
