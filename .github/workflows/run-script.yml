name: Run Google Sheets Script

on:
  workflow_dispatch:
  schedule:
    # ET 8 AM – 11 PM = UTC 12:00 – 03:00 (next day)
    # Runs every 20 minutes
    - cron: "0,20,40 12-23,0-3 * * *"

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Google Sheets sync
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
        run: python getScoreSheet.py

      - name: Commit updated CSVs for GitHub Pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/master_games.csv docs/submitted_scores.csv docs/predictions.csv
          git commit -m "Update CSVs [ci skip]" || echo "No changes"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
