<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Auto Score Reports</title>
  <style>
    /* styles.css */
    .game-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #f5f5f5;
    margin: 10px 0;
    padding: 10px 20px;
    border-radius: 8px;
    font-family: Arial, sans-serif;
    }

    .team {
    display: flex;
    align-items: center;
    gap: 10px;
    }

    .team-name {
    font-weight: bold;
    font-size: 1.2em;
    }

    .team-score {
    font-weight: bold;
    font-size: 1.5em;
    margin: 0 20px;
    }

    .center-info {
    text-align: center;
    font-size: 0.9em;
    color: #555;
    }
  </style>
</head>
<body>
  <h1>CIAC Score Reports</h1>
  <div id="scores"></div>

  <script src="main.js"></script>
</body>
</html>
